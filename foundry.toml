[profile.default]
src = "src"
out = "artifacts"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
solc_version = "0.8.22"

remappings = [
  "@chainlink/contracts-ccip/contracts/=lib/chainlink-local/lib/chainlink-ccip/chains/evm/contracts/",
  "@chainlink/contracts-ccip/src/v0.8/ccip/=lib/ccip/contracts/src/v0.8/ccip/",
  "@chainlink/local/=lib/chainlink-local/",
  "@layerzerolabs/lz-evm-oapp-v2/=lib/LayerZero-v2/packages/layerzero-v2/evm/oapp/",
  "@layerzerolabs/lz-evm-messagelib-v2/=lib/LayerZero-v2/packages/layerzero-v2/evm/messagelib/",
  "@layerzerolabs/lz-evm-protocol-v2/=lib/LayerZero-v2/packages/layerzero-v2/evm/protocol/",
  "@layerzerolabs/test-devtools-evm-foundry/=lib/devtools/packages/test-devtools-evm-foundry/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "solidity-bytes-utils/=lib/solidity-bytes-utils/",
  "@stargate-v2/=lib/stargate-v2/packages/stg-evm-v2/src/"
]

[rpc_endpoints]
mainnet = "https://forno.celo.org/"
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org/"
